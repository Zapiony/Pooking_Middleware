name: Trigger auto deployment for pooking-middleware

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/pooking-middleware-AutoDeployTrigger-e5723705-b14b-49cc-8de0-1d4a2be408ed.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.POOKINGMIDDLEWARE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.POOKINGMIDDLEWARE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.POOKINGMIDDLEWARE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          containerAppName: 'pooking-middleware'
          resourceGroup: 'Pooking-Middleware'
          targetPort: 8080


